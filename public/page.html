<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>eleven</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Roboto', sans-serif; background: #121212; color: #fff; min-height: 100vh; }
  :root { --surface: #1e1e1e; --surface2: #2a2a2a; --border: #333; --primary: #90caf9; --error: #f44336; }
  .app { display: flex; flex-direction: column; min-height: 100vh; }
  .appbar { background: #1e1e1e; border-bottom: 1px solid var(--border); padding: 0 24px; height: 64px; display: flex; align-items: center; justify-content: space-between; }
  .appbar-left { display: flex; align-items: center; gap: 4px; }
  .appbar-title { font-size: 20px; font-weight: 500; }
  .appbar-right { display: flex; align-items: center; gap: 8px; }
  .main { flex: 1; padding: 24px 16px 80px; max-width: 960px; margin: 0 auto; width: 100%; }
  .paper { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; }
  .btn { padding: 10px 24px; border: none; border-radius: 4px; font-size: 14px; font-weight: 500; font-family: 'Roboto', sans-serif; cursor: pointer; text-transform: uppercase; letter-spacing: 0.08em; transition: background 0.2s; }
  .btn-contained { background: var(--primary); color: #000; }
  .btn-contained:hover { background: #42a5f5; }
  .btn-outlined { background: transparent; color: var(--primary); border: 1px solid var(--primary); }
  .btn-outlined:hover { background: rgba(144,202,249,0.08); }
  .icon-btn { background: none; border: none; color: #aaa; cursor: pointer; padding: 8px; border-radius: 50%; display: flex; align-items: center; transition: background 0.2s, color 0.2s; }
  .icon-btn:hover { background: rgba(255,255,255,0.08); color: #fff; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; align-items: center; justify-content: center; padding: 16px; }
  .modal-overlay.open { display: flex; }
  .modal-box { background: #1e1e1e; border: 1px solid var(--border); border-radius: 8px; padding: 28px; width: 100%; max-width: 360px; text-align: center; }
  .banner { text-align: center; padding: 12px 16px; margin-bottom: 12px; font-size: 14px; border-radius: 4px; border: 1px solid var(--border); color: #aaa; }
  .banner.my-turn { border-color: var(--primary); background: rgba(144,202,249,0.06); color: var(--primary); }
  .desk { width: 96px; height: 64px; display: flex; align-items: center; justify-content: center; position: relative; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; transition: all 0.15s; }
  .desk.current { border-color: var(--primary); background: rgba(144,202,249,0.06); }
  .desk.me { border-color: #90caf9; }
  .desk-num { position: absolute; top: 4px; right: 6px; font-size: 10px; color: #444; }
  .desk-name { font-size: 11px; text-align: center; padding: 0 4px; word-break: break-all; line-height: 1.3; }
  .player-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
  .player-row:last-child { border-bottom: none; }
  .stat { font-size: 13px; color: #aaa; }
  .stat span { color: #fff; font-weight: 500; }
  .lang-menu { position: absolute; top: 56px; right: 16px; background: #1e1e1e; border: 1px solid var(--border); border-radius: 8px; min-width: 140px; z-index: 200; box-shadow: 0 4px 16px rgba(0,0,0,0.5); }
  .lang-item { padding: 10px 16px; cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 10px; transition: background 0.15s; }
  .lang-item:hover { background: rgba(255,255,255,0.06); }
  .lang-item.active { color: var(--primary); }
  .mui-input { background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 10px 14px; font-size: 16px; color: #fff; font-family: 'Roboto', sans-serif; outline: none; transition: border-color 0.2s; width: 100%; }
  .mui-input:focus { border-color: var(--primary); }
</style>
</head>
<body>
<div id="overlay" class="modal-overlay">
  <div id="overlayBox" class="modal-box"></div>
</div>
<div id="langMenu" class="lang-menu" style="display:none;">
  <div class="lang-item" data-lang="tr" onclick="setLang('tr')"><span>🇹🇷</span> Türkçe</div>
  <div class="lang-item" data-lang="en" onclick="setLang('en')"><span>🇬🇧</span> English</div>
  <div class="lang-item" data-lang="de" onclick="setLang('de')"><span>🇩🇪</span> Deutsch</div>
  <div class="lang-item" data-lang="es" onclick="setLang('es')"><span>🇪🇸</span> Español</div>
</div>
<div class="app">
  <header class="appbar">
    <div class="appbar-left">
      <button class="icon-btn" onclick="window.location='/'"><span class="material-icons">arrow_back</span></button>
      <span class="appbar-title">eleven</span>
    </div>
    <div class="appbar-right">
      <div id="gameStats" style="display:none;align-items:center;gap:16px;">
        <span class="stat">sayaç: <span id="numberDisplay">0</span></span>
        <span class="stat">kalan: <span id="aliveCount">—</span></span>
      </div>
      <span class="stat" style="font-family:monospace;" id="roomCodeEl"></span>
      <button class="icon-btn" id="langBtn" onclick="toggleLangMenu()"><span id="langFlag" style="font-size:20px;">🇹🇷</span></button>
    </div>
  </header>
  <main class="main">
    <div id="lobby" style="display:none;max-width:380px;margin:0 auto;">
      <div class="paper">
        <p id="t-players" style="font-size:12px;color:#aaa;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:16px;">OYUNCULAR</p>
        <ul id="playerList" style="list-style:none;margin-bottom:16px;"></ul>
        <p id="waitMsg" style="display:none;font-size:13px;color:#aaa;text-align:center;margin-bottom:12px;"></p>
        <button id="startBtn" class="btn btn-contained" style="display:none;width:100%;" onclick="startGame()"></button>
      </div>
    </div>
    <div id="game" style="display:none;">
      <div id="turnBanner" class="banner"></div>
      <div style="display:flex;gap:8px;margin-bottom:4px;">
        <input id="moveInput" class="mui-input" type="text" autocomplete="off" style="flex:1;" placeholder="1, 2, 3">
        <button class="btn btn-outlined" onclick="sendMove()" id="t-send">GÖNDER</button>
      </div>
      <p id="moveError" style="color:var(--error);font-size:12px;min-height:16px;margin-bottom:12px;padding-left:2px;"></p>
      <div id="feed" style="text-align:center;margin-bottom:12px;min-height:16px;"></div>
      <div id="grid" style="display:flex;flex-direction:column;gap:8px;align-items:center;"></div>
    </div>
  </main>
</div>
<script src="/socket.io/socket.io.js"></script>
<script>
const i18n = {
  tr: { players:'OYUNCULAR', wait:'Host oyunu başlatmasını bekliyor...', start:'OYUNU BAŞLAT', myTurn:'sıra sende', turn:'sıra: ', send:'GÖNDER', nameEmpty:'isim boş olamaz', again:'TEKRAR', exit:'ÇIKIŞ', elim:' elendi', errTitle:'Hata', back:'GERİ DÖN', counter:'sayaç: ', left:'kalan: ' },
  en: { players:'PLAYERS', wait:'Waiting for host to start...', start:'START GAME', myTurn:'your turn', turn:'turn: ', send:'SEND', nameEmpty:'name cannot be empty', again:'AGAIN', exit:'EXIT', elim:' eliminated', errTitle:'Error', back:'GO BACK', counter:'counter: ', left:'left: ' },
  de: { players:'SPIELER', wait:'Warten auf den Host...', start:'SPIEL STARTEN', myTurn:'du bist dran', turn:'dran: ', send:'SENDEN', nameEmpty:'Name darf nicht leer sein', again:'NOCHMAL', exit:'BEENDEN', elim:' raus', errTitle:'Fehler', back:'ZURÜCK', counter:'Zähler: ', left:'übrig: ' },
  es: { players:'JUGADORES', wait:'Esperando al anfitrión...', start:'INICIAR JUEGO', myTurn:'tu turno', turn:'turno: ', send:'ENVIAR', nameEmpty:'nombre no puede estar vacío', again:'OTRA VEZ', exit:'SALIR', elim:' eliminado', errTitle:'Error', back:'VOLVER', counter:'contador: ', left:'quedan: ' }
}
const flags = { tr:'🇹🇷', en:'🇬🇧', de:'🇩🇪', es:'🇪🇸' }
function getLang() { return localStorage.getItem('lang') || 'tr' }
function setLang(l) { localStorage.setItem('lang',l); applyLang(l); closeLangMenu() }
function applyLang(l) {
  const t = i18n[l]
  document.getElementById('langFlag').textContent = flags[l]
  document.querySelectorAll('.lang-item').forEach(el => el.classList.toggle('active', el.dataset.lang===l))
  document.getElementById('t-players').textContent = t.players
  document.getElementById('waitMsg').textContent = t.wait
  document.getElementById('startBtn').textContent = t.start
  document.getElementById('t-send').textContent = t.send
}
function toggleLangMenu() { const m=document.getElementById('langMenu'); m.style.display=m.style.display==='none'?'block':'none' }
function closeLangMenu() { document.getElementById('langMenu').style.display='none' }
document.addEventListener('click', e => { if (!document.getElementById('langBtn').contains(e.target)) closeLangMenu() })
applyLang(getLang())

const socket = io()
const params = new URLSearchParams(window.location.search)
const roomCode = params.get('room')
let playerName = params.get('name') || localStorage.getItem('playerName')
document.getElementById('roomCodeEl').textContent = roomCode || ''

function showOverlay(html) { document.getElementById('overlayBox').innerHTML=html; document.getElementById('overlay').classList.add('open') }
function hideOverlay() { document.getElementById('overlay').classList.remove('open') }

if (!playerName) {
  showOverlay(`<p style="font-size:20px;font-weight:500;margin-bottom:20px;">eleven</p><input id="nameInput" class="mui-input" type="text" maxlength="20" placeholder="name" style="margin-bottom:8px;"><p id="overlayErr" style="color:#f44336;font-size:12px;min-height:14px;margin-bottom:12px;"></p><button class="btn btn-contained" style="width:100%;" onclick="saveName()">OK</button>`)
} else { joinRoom() }

function saveName() {
  const name = document.getElementById('nameInput').value.trim()
  if (!name) { document.getElementById('overlayErr').textContent = i18n[getLang()].nameEmpty; return }
  localStorage.setItem('playerName',name); playerName=name; hideOverlay(); joinRoom()
}
function joinRoom() { socket.emit('joinRoom',{name:playerName,code:roomCode}) }

socket.on('errorMessage', msg => {
  const t = i18n[getLang()]
  showOverlay(`<p style="font-size:18px;font-weight:500;margin-bottom:8px;">${t.errTitle}</p><p style="font-size:13px;color:#aaa;margin-bottom:20px;">${msg}</p><button class="btn btn-outlined" style="width:100%;" onclick="window.location='/'">${t.back}</button>`)
})
socket.on('updateRoom', data => render(data))
socket.on('playerEliminated', ({name}) => addFeed('💀 ' + name + i18n[getLang()].elim))
socket.on('gameOver', ({winner, reason}) => {
  const t = i18n[getLang()]; const l = getLang()
  const isMe = winner === playerName
  const emoji = isMe ? '🏆' : '👾'
  const title = isMe ? {tr:'Kazandın!',en:'You won!',de:'Gewonnen!',es:'¡Ganaste!'}[l] : {tr:'Oyun bitti',en:'Game over',de:'Spiel vorbei',es:'Juego terminado'}[l]
  const sub = reason==='opponent_left' ? {tr:'Rakip ayrıldı.',en:'Opponent left.',de:'Gegner weg.',es:'Rival se fue.'}[l] : `${winner}`
  showOverlay(`<p style="font-size:40px;margin-bottom:8px;">${emoji}</p><p style="font-size:18px;font-weight:500;margin-bottom:6px;">${title}</p><p style="font-size:13px;color:#aaa;margin-bottom:24px;">${sub}</p><div style="display:flex;gap:8px;"><button class="btn btn-contained" style="flex:1;" onclick="location.reload()">${t.again}</button><button class="btn btn-outlined" style="flex:1;" onclick="window.location='/'">${t.exit}</button></div>`)
})

function render(data) {
  const t = i18n[getLang()]
  if (data.started) {
    document.getElementById('lobby').style.display='none'
    document.getElementById('game').style.display='block'
    document.getElementById('gameStats').style.display='flex'
  } else {
    document.getElementById('lobby').style.display='block'
    document.getElementById('game').style.display='none'
    document.getElementById('gameStats').style.display='none'
    const list = document.getElementById('playerList')
    list.innerHTML=''
    data.players.forEach(p => {
      const li=document.createElement('li'); li.className='player-row'
      li.innerHTML=`<span>${p}</span>${p===data.host?'<span style="font-size:11px;color:#aaa;">HOST</span>':''}`
      list.appendChild(li)
    })
    document.getElementById('startBtn').style.display = playerName===data.host?'block':'none'
    document.getElementById('waitMsg').style.display = playerName!==data.host?'block':'none'
    return
  }
  document.getElementById('numberDisplay').textContent = data.currentNumber
  document.getElementById('aliveCount').textContent = data.players.length
  const cur = data.players[data.currentPlayerIndex]
  const isMyTurn = cur === playerName
  const banner = document.getElementById('turnBanner')
  const input = document.getElementById('moveInput')
  banner.textContent = isMyTurn ? t.myTurn : t.turn + (cur||'')
  banner.className = 'banner' + (isMyTurn?' my-turn':'')
  input.disabled = !isMyTurn
  if (isMyTurn) input.focus()
  const elim = data.eliminated||[]
  const seats=[]
  for(let i=0;i<data.rows*data.cols;i++){
    if(i<data.players.length) seats.push({name:data.players[i],state:'active'})
    else if(i<data.players.length+elim.length) seats.push({name:elim[i-data.players.length],state:'out'})
    else seats.push(null)
  }
  const grid=document.getElementById('grid'); grid.innerHTML=''; let idx=0
  for(let r=0;r<data.rows;r++){
    const row=document.createElement('div'); row.style.cssText='display:flex;gap:8px;flex-wrap:wrap;justify-content:center;'
    for(let c=0;c<data.cols;c++){
      const seat=seats[idx]; const desk=document.createElement('div'); desk.className='desk'
      const num=document.createElement('div'); num.className='desk-num'; num.textContent=idx+1; desk.appendChild(num)
      if(seat){
        const nameEl=document.createElement('div'); nameEl.className='desk-name'; nameEl.textContent=seat.name
        if(seat.state==='out'){desk.style.opacity='0.2';nameEl.style.textDecoration='line-through';nameEl.style.color='#555'}
        else{if(idx===data.currentPlayerIndex)desk.classList.add('current');if(seat.name===playerName)desk.classList.add('me')}
        desk.appendChild(nameEl)
      }
      row.appendChild(desk); idx++
    }
    grid.appendChild(row)
  }
}

function addFeed(msg){const f=document.getElementById('feed');const p=document.createElement('p');p.style.cssText='font-size:12px;color:#666;margin:2px 0;';p.textContent=msg;f.prepend(p);while(f.children.length>4)f.removeChild(f.lastChild)}
function startGame(){socket.emit('startGame')}
function sendMove(){
  const input=document.getElementById('moveInput'); const errEl=document.getElementById('moveError')
  const val=input.value.trim(); errEl.textContent=''
  if(!val){errEl.textContent='!';return}
  const nums=val.split(',').map(n=>parseInt(n.trim())).filter(n=>!isNaN(n))
  if(!nums.length||nums.length>3){errEl.textContent='1-3';return}
  socket.emit('move',nums); input.value=''
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')sendMove()})
</script>
</body>
</html>
