<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>eleven</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://unpkg.com/nes.css/css/nes.min.css" rel="stylesheet" id="nesCss" disabled>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  body.classic * { font-family: 'Inter', sans-serif; }
  body.retro * { font-family: 'Press Start 2P', monospace; }

  body.classic { background: #0a0a0a; color: #f5f5f5; }
  body.retro   { background: #212529; color: #fff; }

  .card {
    background: #171717; border: 1px solid #262626; border-radius: 16px; padding: 24px;
  }
  body.retro .card { background: transparent; border: none; border-radius: 0; padding: 0; }

  .field { display: flex; flex-direction: column; gap: 6px; }
  .label { font-size: 12px; color: #737373; }
  body.retro .label { font-size: 8px; color: #aaa; }

  input, select {
    background: #262626; border: 1px solid #404040; border-radius: 12px;
    padding: 10px 16px; font-size: 14px; color: #fff; outline: none; width: 100%;
    box-sizing: border-box; transition: border-color 0.15s;
  }
  input:focus, select:focus { border-color: #737373; }
  body.retro input, body.retro select { font-size: 10px !important; border-radius: 0; }

  .btn-primary {
    background: #fff; color: #0a0a0a; border: none; border-radius: 12px;
    padding: 10px; font-size: 14px; font-weight: 500; cursor: pointer; width: 100%;
    transition: background 0.15s; margin-top: auto;
  }
  .btn-primary:hover { background: #e5e5e5; }
  .btn-secondary {
    background: #262626; color: #fff; border: 1px solid #404040; border-radius: 12px;
    padding: 10px; font-size: 14px; font-weight: 500; cursor: pointer; width: 100%;
    transition: background 0.15s; margin-top: auto;
  }
  .btn-secondary:hover { background: #333; }
  body.retro .btn-primary  { font-size: 10px !important; border-radius: 0; }
  body.retro .btn-secondary { font-size: 10px !important; border-radius: 0; }

  .icon-btn {
    background: none; border: none; color: #525252; cursor: pointer;
    padding: 7px; border-radius: 8px; display: flex; align-items: center;
    transition: color 0.15s, background 0.15s;
  }
  .icon-btn:hover { color: #fff; background: #1f1f1f; }
  .icon-btn.active { color: #fff; background: #1f1f1f; }
  body.retro .icon-btn { border-radius: 0; }

  .modal-bg {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75);
    z-index: 50; align-items: center; justify-content: center; padding: 16px;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: #171717; border: 1px solid #262626; border-radius: 20px;
    padding: 24px; width: 100%; max-width: 340px;
  }
  body.retro .modal { background: #212529; border: 4px solid #fff; border-radius: 0; }

  .theme-btn {
    border: 1px solid #404040; border-radius: 10px; padding: 10px 16px;
    cursor: pointer; background: #262626; color: #fff; font-size: 13px;
    transition: all 0.15s; flex: 1;
  }
  .theme-btn:hover { border-color: #737373; }
  .theme-btn.active { border-color: #fff; background: #333; }
  body.retro .theme-btn { border-radius: 0; font-size: 8px !important; font-family: 'Press Start 2P', monospace; }
  body.retro .theme-btn.active { border-color: #92cc41; border-width: 4px; }

  .error { color: #f87171; font-size: 13px; text-align: center; margin-top: 12px; display: none; }
  body.retro .error { font-size: 8px; }

  .section-title { font-size: 11px; color: #525252; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 20px; }
  body.retro .section-title { font-size: 8px; color: #aaa; }

  .divider-line { background: #262626; }
  .divider-text { color: #404040; font-size: 12px; }
  body.retro .divider-text { font-size: 8px; color: #555; }
</style>
</head>
<body class="classic min-h-screen flex flex-col p-5">

  <!-- Party Modal -->
  <div id="partyModal" class="modal-bg">
    <div class="modal" style="max-width:520px;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <span style="font-weight:600; font-size:15px;">parti</span>
        <button class="icon-btn" onclick="closeParty()">
          <i data-lucide="x" style="width:16px;height:16px;"></i>
        </button>
      </div>
      <div style="display:flex; gap:16px; align-items:stretch; flex-wrap:wrap;">
        <!-- Create -->
        <div style="flex:1; min-width:180px; display:flex; flex-direction:column; gap:16px;">
          <p class="section-title" style="margin-bottom:0;">oluştur</p>
          <div class="field">
            <label class="label">isim</label>
            <input id="name" type="text" maxlength="20" placeholder="adınız">
          </div>
          <div class="field">
            <label class="label">sınıf boyutu</label>
            <select id="gridSize">
              <option value="5x4">5 × 4 — 20 kişi</option>
              <option value="5x5">5 × 5 — 25 kişi</option>
              <option value="4x4">4 × 4 — 16 kişi</option>
              <option value="6x5">6 × 5 — 30 kişi</option>
            </select>
          </div>
          <button class="btn-primary" onclick="createRoom()">oluştur</button>
        </div>

        <!-- Divider -->
        <div style="display:flex; flex-direction:column; align-items:center; gap:6px; padding:8px 0;">
          <div class="divider-line" style="width:1px; flex:1;"></div>
          <span class="divider-text">ya da</span>
          <div class="divider-line" style="width:1px; flex:1;"></div>
        </div>

        <!-- Join -->
        <div style="flex:1; min-width:180px; display:flex; flex-direction:column; gap:16px;">
          <p class="section-title" style="margin-bottom:0;">katıl</p>
          <div class="field">
            <label class="label">isim</label>
            <input id="nameJoin" type="text" maxlength="20" placeholder="adınız">
          </div>
          <div class="field">
            <label class="label">parti kodu</label>
            <input id="code" type="text" maxlength="10" placeholder="xxxxx" autocomplete="off" style="text-transform:uppercase; letter-spacing:4px;">
          </div>
          <button class="btn-secondary" onclick="joinRoom()">katıl</button>
        </div>
      </div>
      <p id="errorMsg" class="error"></p>
    </div>
  </div>

  <!-- Settings Modal -->
  <div id="settingsModal" class="modal-bg">
    <div class="modal">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <span style="font-weight:600; font-size:15px;">ayarlar</span>
        <button class="icon-btn" onclick="closeSettings()">
          <i data-lucide="x" style="width:16px;height:16px;"></i>
        </button>
      </div>
      <p class="label" style="margin-bottom:8px;">tema</p>
      <div style="display:flex; gap:8px;">
        <button class="theme-btn" id="btnClassic" onclick="setTheme('classic')">klasik</button>
        <button class="theme-btn" id="btnRetro" onclick="setTheme('retro')">retro</button>
      </div>
    </div>
  </div>

  <!-- Header -->
  <header style="display:flex; justify-content:space-between; align-items:center; max-width:900px; width:100%; margin:0 auto 40px;">
    <span style="font-size:20px; font-weight:600;">eleven</span>
    <div style="display:flex; gap:4px;">
      <button class="icon-btn" id="partyBtn" onclick="openParty()" title="parti">
        <i data-lucide="layout-grid" style="width:20px;height:20px;"></i>
      </button>
      <button class="icon-btn" id="settingsBtn" onclick="openSettings()" title="ayarlar">
        <i data-lucide="settings" style="width:20px;height:20px;"></i>
      </button>
    </div>
  </header>

  <!-- Main content -->
  <main style="max-width:900px; width:100%; margin:0 auto; flex:1; display:flex; align-items:center; justify-content:center;">
    <div style="text-align:center;">
      <p style="font-size:48px; font-weight:600; margin:0 0 8px; letter-spacing:-2px;">eleven</p>
      <p style="font-size:14px; color:#525252; margin:0 0 32px;">sayı oyunu</p>
      <button class="btn-primary" style="width:auto; padding:10px 32px; border-radius:12px;" onclick="openParty()">
        başla
      </button>
    </div>
  </main>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="/socket.io/socket.io.js"></script>
<script>
lucide.createIcons()

// Theme
function getTheme() { return localStorage.getItem("theme") || "classic" }
function setTheme(t) {
  localStorage.setItem("theme", t)
  applyTheme(t)
  updateThemeBtns(t)
}
function applyTheme(t) {
  document.body.className = t + " min-h-screen flex flex-col p-5"
  document.getElementById("nesCss").disabled = (t !== "retro")
  lucide.createIcons()
}
function updateThemeBtns(t) {
  document.getElementById("btnClassic").classList.toggle("active", t === "classic")
  document.getElementById("btnRetro").classList.toggle("active", t === "retro")
}

function openParty() {
  document.getElementById("partyModal").classList.add("open")
  document.getElementById("partyBtn").classList.add("active")
}
function closeParty() {
  document.getElementById("partyModal").classList.remove("open")
  document.getElementById("partyBtn").classList.remove("active")
}
function openSettings() {
  updateThemeBtns(getTheme())
  document.getElementById("settingsModal").classList.add("open")
  document.getElementById("settingsBtn").classList.add("active")
}
function closeSettings() {
  document.getElementById("settingsModal").classList.remove("open")
  document.getElementById("settingsBtn").classList.remove("active")
}

// Close modal on backdrop click
document.getElementById("partyModal").addEventListener("click", e => { if (e.target === e.currentTarget) closeParty() })
document.getElementById("settingsModal").addEventListener("click", e => { if (e.target === e.currentTarget) closeSettings() })

applyTheme(getTheme())

// Socket
const socket = io()

function showError(msg) {
  const el = document.getElementById("errorMsg")
  el.textContent = msg
  el.style.display = "block"
}
function clearError() {
  document.getElementById("errorMsg").style.display = "none"
}

function createRoom() {
  clearError()
  const name = document.getElementById("name").value.trim()
  if (!name) return showError("isim boş olamaz")
  const grid = document.getElementById("gridSize").value
  const [cols, rows] = grid.split("x").map(Number)
  localStorage.setItem("playerName", name)
  socket.emit("createRoom", { name, rows, cols })
}

function joinRoom() {
  clearError()
  const name = document.getElementById("nameJoin").value.trim()
  const code = document.getElementById("code").value.trim().toUpperCase()
  if (!name) return showError("isim boş olamaz")
  if (!code) return showError("parti kodu boş olamaz")
  localStorage.setItem("playerName", name)
  socket.emit("joinRoom", { name, code })
}

socket.on("roomCreated", code => {
  const name = document.getElementById("name").value.trim()
  window.location = `/game?room=${code}&name=${encodeURIComponent(name)}`
})
socket.on("updateRoom", () => {
  const name = document.getElementById("nameJoin").value.trim()
  const code = document.getElementById("code").value.trim().toUpperCase()
  if (code) window.location = `/game?room=${code}&name=${encodeURIComponent(name)}`
})
socket.on("errorMessage", msg => showError(msg))

document.getElementById("name").addEventListener("keydown", e => { if (e.key === "Enter") createRoom() })
document.getElementById("nameJoin").addEventListener("keydown", e => { if (e.key === "Enter") joinRoom() })
document.getElementById("code").addEventListener("keydown", e => { if (e.key === "Enter") joinRoom() })
</script>
</body>
</html>
