<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Eleven</title>
<link href="https://unpkg.com/nes.css/css/nes.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css?family=Press+Start+2P" rel="stylesheet">
<style>
* { box-sizing: border-box; }
body {
  font-family: "Press Start 2P";
  background: #212529;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 40px 16px;
}

h1 {
  color: #92cc41;
  font-size: 28px;
  letter-spacing: 6px;
  margin-bottom: 8px;
  text-align: center;
}
.subtitle {
  font-size: 8px;
  color: #666;
  margin-bottom: 40px;
  text-align: center;
}

.cards {
  display: flex;
  gap: 24px;
  width: 100%;
  max-width: 820px;
  align-items: flex-start;
}

.card {
  flex: 1;
}

.card label {
  font-size: 9px;
  color: #aaa;
  display: block;
  margin-bottom: 8px;
}

.card .nes-input,
.card .nes-select select {
  font-size: 10px;
  width: 100%;
}

.card .nes-select {
  width: 100%;
}

.card .nes-btn {
  width: 100%;
  margin-top: 16px;
  font-size: 10px;
}

.divider {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding-top: 40px;
  color: #444;
  font-size: 10px;
  gap: 10px;
  user-select: none;
}
.divider-line {
  width: 2px;
  height: 60px;
  background: #333;
}

#errorMsg {
  display: none;
  margin-top: 20px;
  font-size: 9px;
  text-align: center;
  max-width: 820px;
  width: 100%;
}

@media (max-width: 600px) {
  .cards { flex-direction: column; }
  .divider { flex-direction: row; padding-top: 0; }
  .divider-line { width: 60px; height: 2px; }
  h1 { font-size: 20px; }
}
</style>
</head>
<body>

<h1>ELEVEN</h1>
<p class="subtitle">sayı oyunu</p>

<div class="cards">

  <!-- Oluştur -->
  <section class="nes-container with-title is-dark card">
    <h2 class="title">Oluştur</h2>

    <label>İsim</label>
    <input id="name" class="nes-input is-dark" maxlength="20" placeholder="adınız...">

    <br><br>

    <label>Sınıf Boyutu</label>
    <div class="nes-select is-dark">
      <select id="gridSize">
        <option value="5x4">5 × 4 — 20 kişi</option>
        <option value="5x5">5 × 5 — 25 kişi</option>
        <option value="4x4">4 × 4 — 16 kişi</option>
        <option value="6x5">6 × 5 — 30 kişi</option>
      </select>
    </div>

    <button class="nes-btn is-success" onclick="createRoom()">Parti Oluştur</button>
  </section>

  <div class="divider">
    <div class="divider-line"></div>
    YA DA
    <div class="divider-line"></div>
  </div>

  <!-- Katıl -->
  <section class="nes-container with-title is-dark card">
    <h2 class="title">Katıl</h2>

    <label>İsim</label>
    <input id="nameJoin" class="nes-input is-dark" maxlength="20" placeholder="adınız...">

    <br><br>

    <label>Parti Kodu</label>
    <input id="code" class="nes-input is-dark" maxlength="10" placeholder="XXXXX" style="text-transform:uppercase;letter-spacing:4px;">

    <button class="nes-btn is-warning" onclick="joinRoom()">Katıl</button>
  </section>

</div>

<p id="errorMsg" class="nes-text is-error"></p>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io()

function showError(msg) {
  const el = document.getElementById("errorMsg")
  el.textContent = msg
  el.style.display = "block"
}
function clearError() {
  const el = document.getElementById("errorMsg")
  el.textContent = ""
  el.style.display = "none"
}

function createRoom() {
  clearError()
  const name = document.getElementById("name").value.trim()
  if (!name) return showError("İsim boş olamaz.")

  const grid = document.getElementById("gridSize").value
  const [cols, rows] = grid.split("x").map(Number)

  localStorage.setItem("playerName", name)
  socket.emit("createRoom", { name, rows, cols })
}

function joinRoom() {
  clearError()
  const name = document.getElementById("nameJoin").value.trim()
  const code = document.getElementById("code").value.trim().toUpperCase()

  if (!name) return showError("İsim boş olamaz.")
  if (!code) return showError("Parti kodu boş olamaz.")

  localStorage.setItem("playerName", name)
  socket.emit("joinRoom", { name, code })
}

socket.on("roomCreated", code => {
  const name = document.getElementById("name").value.trim()
  window.location = `/game.html?room=${code}&name=${encodeURIComponent(name)}`
})

socket.on("updateRoom", () => {
  const name = document.getElementById("nameJoin").value.trim()
  const code = document.getElementById("code").value.trim().toUpperCase()
  if (code) {
    window.location = `/game.html?room=${code}&name=${encodeURIComponent(name)}`
  }
})

socket.on("errorMessage", msg => showError(msg))

// Enter tuşu desteği
document.getElementById("code").addEventListener("keydown", e => {
  if (e.key === "Enter") joinRoom()
})
document.getElementById("nameJoin").addEventListener("keydown", e => {
  if (e.key === "Enter") joinRoom()
})
document.getElementById("name").addEventListener("keydown", e => {
  if (e.key === "Enter") createRoom()
})
</script>

</body>
</html>
