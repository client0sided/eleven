<!DOCTYPE html>
<html>
<head>
<title>Eleven</title>
<link href="https://unpkg.com/nes.css/css/nes.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css?family=Press+Start+2P" rel="stylesheet">
<style>
* { box-sizing: border-box; }
body {
  font-family: "Press Start 2P";
  background: #1a1a1a;
  display: flex;
  justify-content: center;
  padding: 40px 20px;
  min-height: 100vh;
}
.wrapper { width: 1100px; max-width: 100%; }

.code {
  text-align: center;
  font-size: 18px;
  margin-bottom: 20px;
  color: #92cc41;
}

/* Grid */
.row {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.desk {
  width: 140px;
  height: 110px;
  background: #2d2d2d;
  border: 4px solid #555;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  transition: border-color 0.2s, background 0.2s;
  position: relative;
}
.desk.active {
  border-color: #e76e55;
  background: #3a1a1a;
  box-shadow: 0 0 12px #e76e5588;
}
.desk.eliminated-desk {
  border-color: #333;
  background: #1a1a1a;
  opacity: 0.35;
}
.student {
  font-size: 9px;
  margin-top: 6px;
  text-align: center;
  word-break: break-all;
  padding: 0 4px;
  color: #fff;
}
.desk.eliminated-desk .student {
  text-decoration: line-through;
  color: #666;
}
.desk-num {
  font-size: 8px;
  color: #666;
  position: absolute;
  top: 4px;
  right: 6px;
}

/* Lobby */
#lobby { text-align: center; }
#playerList {
  list-style: none;
  padding: 0;
  margin: 16px 0;
  max-height: 300px;
  overflow-y: auto;
}
#playerList li {
  font-size: 10px;
  padding: 6px 0;
  border-bottom: 1px solid #333;
}

/* Game UI */
#gameControls {
  text-align: center;
  margin-bottom: 30px;
}
#number {
  font-size: 48px;
  text-align: center;
  color: #92cc41;
  margin: 0 0 10px 0;
}
#turnMsg {
  text-align: center;
  font-size: 10px;
  margin-bottom: 20px;
  min-height: 20px;
}
#moveRow {
  display: flex;
  justify-content: center;
  gap: 12px;
  align-items: center;
  flex-wrap: wrap;
}
#moveInput {
  width: 220px;
}
#moveError {
  display: none;
  font-size: 9px;
  margin-top: 10px;
  text-align: center;
}
#errorMsg {
  display: none;
  font-size: 9px;
  margin-top: 10px;
  text-align: center;
}

/* Eliminated feed */
#eliminatedFeed {
  margin-top: 20px;
  text-align: center;
  min-height: 30px;
}
#eliminatedFeed p {
  font-size: 9px;
  color: #e76e55;
  margin: 4px 0;
}

/* Overlay */
#overlay {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.85);
  z-index: 200;
  justify-content: center;
  align-items: center;
}
#overlay.show { display: flex; }
.overlay-box { width: 420px; max-width: 95vw; }

.hidden { display: none; }
</style>
</head>
<body>

<!-- Overlay: name prompt, game over, eliminated notice -->
<div id="overlay">
  <section class="nes-container with-title is-dark overlay-box" id="overlayBox">
    <!-- filled by JS -->
  </section>
</div>

<section class="nes-container with-title is-dark wrapper">
  <h2 class="title">ELEVEN</h2>

  <div class="code">KOD: <span id="roomCode"></span></div>
  <p id="errorMsg" class="nes-text is-error"></p>

  <!-- LOBBY -->
  <div id="lobby">
    <h3 style="text-align:center;">Oyuncular</h3>
    <ul id="playerList"></ul>
    <button id="startBtn" class="nes-btn is-primary hidden" onclick="startGame()">Oyunu Başlat</button>
    <p id="waitMsg" class="hidden" style="font-size:10px;text-align:center;color:#aaa;">Hostin oyunu başlatması bekleniyor...</p>
  </div>

  <!-- GAME -->
  <div id="game" class="hidden">
    <p id="number">0</p>
    <p id="turnMsg"></p>

    <div id="gameControls">
      <div id="moveRow">
        <input id="moveInput" class="nes-input is-dark" placeholder="örn: 1 veya 1,2 veya 1,2,3">
        <button class="nes-btn is-error" onclick="sendMove()">Gönder</button>
      </div>
      <p id="moveError" class="nes-text is-error"></p>
    </div>

    <div id="eliminatedFeed"></div>
    <br>
    <div id="grid"></div>
  </div>

</section>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io()
const params = new URLSearchParams(window.location.search)
const roomCode = params.get("room")
let playerName = params.get("name") || localStorage.getItem("playerName")

document.getElementById("roomCode").innerText = roomCode

// ── Name prompt if missing ──────────────────────────────────────────────────
if (!playerName) {
  showOverlay(`
    <h2 class="title">Hoş Geldin</h2>
    <p style="font-size:10px;">Adınız ne?</p>
    <input id="nameInput" class="nes-input is-dark" maxlength="20">
    <br><br>
    <button class="nes-btn is-success" onclick="saveName()">Devam</button>
    <p id="nameErr" class="nes-text is-error" style="display:none;margin-top:10px;font-size:9px;"></p>
  `)
} else {
  joinRoom()
}

function saveName() {
  const name = document.getElementById("nameInput").value.trim()
  if (!name) {
    document.getElementById("nameErr").textContent = "İsim boş olamaz."
    document.getElementById("nameErr").style.display = "block"
    return
  }
  localStorage.setItem("playerName", name)
  playerName = name
  hideOverlay()
  joinRoom()
}

function joinRoom() {
  socket.emit("joinRoom", { name: playerName, code: roomCode })
}

// ── Overlay helpers ─────────────────────────────────────────────────────────
function showOverlay(html) {
  document.getElementById("overlayBox").innerHTML = html
  document.getElementById("overlay").classList.add("show")
}
function hideOverlay() {
  document.getElementById("overlay").classList.remove("show")
}

// ── Socket events ───────────────────────────────────────────────────────────
socket.on("errorMessage", msg => {
  const el = document.getElementById("errorMsg")
  el.textContent = msg
  el.style.display = "block"
})

socket.on("updateRoom", data => {
  render(data)
})

socket.on("playerEliminated", ({ name }) => {
  const feed = document.getElementById("eliminatedFeed")
  const p = document.createElement("p")
  p.textContent = `💀 ${name} elendi!`
  feed.prepend(p)
  // keep only last 5 messages
  while (feed.children.length > 5) feed.removeChild(feed.lastChild)
})

socket.on("gameOver", ({ winner, reason }) => {
  let msg = winner === playerName
    ? "🏆 Tebrikler, kazandın!"
    : `🏆 Kazanan: ${winner}`
  if (reason === "opponent_left") {
    msg = winner === playerName
      ? "Rakip ayrıldı. Kazandın!"
      : `Rakip ayrıldı. Kazanan: ${winner}`
  }
  showOverlay(`
    <h2 class="title">Oyun Bitti</h2>
    <p style="font-size:11px;">${msg}</p>
    <br>
    <button class="nes-btn is-success" onclick="window.location='/'">Ana Menü</button>
  `)
})

// ── Render ──────────────────────────────────────────────────────────────────
function render(data) {
  // Player list in lobby
  const list = document.getElementById("playerList")
  list.innerHTML = ""
  data.players.forEach(p => {
    const li = document.createElement("li")
    li.innerText = p + (p === data.host ? " ⭐" : "")
    list.appendChild(li)
  })

  if (data.started) {
    document.getElementById("lobby").classList.add("hidden")
    document.getElementById("game").classList.remove("hidden")
  } else {
    const startBtn = document.getElementById("startBtn")
    const waitMsg = document.getElementById("waitMsg")
    if (playerName === data.host) {
      startBtn.classList.remove("hidden")
      waitMsg.classList.add("hidden")
    } else {
      startBtn.classList.add("hidden")
      waitMsg.classList.remove("hidden")
    }
  }

  // Current number
  document.getElementById("number").innerText = data.currentNumber

  // Turn message
  const currentPlayer = data.players[data.currentPlayerIndex]
  const turnEl = document.getElementById("turnMsg")
  if (currentPlayer === playerName) {
    turnEl.innerHTML = `<span style="color:#92cc41;">⬇ Sıra sende!</span>`
  } else {
    turnEl.innerHTML = `<span style="color:#aaa;">Sıra: ${currentPlayer || ""}</span>`
  }

  // Grid
  const grid = document.getElementById("grid")
  grid.innerHTML = ""

  // All seats = rows * cols, players fill from top, rest empty
  const allNames = [...data.players]
  const eliminated = data.eliminated || []

  // Build seat array: active players first, then eliminated at end (greyed)
  const seats = []
  for (let i = 0; i < data.rows * data.cols; i++) {
    if (i < allNames.length) seats.push({ name: allNames[i], state: "active" })
    else if (i < allNames.length + eliminated.length) seats.push({ name: eliminated[i - allNames.length], state: "eliminated" })
    else seats.push(null)
  }

  let idx = 0
  for (let r = 0; r < data.rows; r++) {
    const rowDiv = document.createElement("div")
    rowDiv.className = "row"

    for (let c = 0; c < data.cols; c++) {
      const seat = seats[idx]
      const desk = document.createElement("div")
      desk.className = "desk"

      const numEl = document.createElement("div")
      numEl.className = "desk-num"
      numEl.innerText = idx + 1
      desk.appendChild(numEl)

      if (seat && seat.state === "active") {
        const nameDiv = document.createElement("div")
        nameDiv.className = "student"
        nameDiv.innerText = seat.name
        desk.appendChild(nameDiv)
        if (idx === data.currentPlayerIndex) {
          desk.classList.add("active")
        }
      } else if (seat && seat.state === "eliminated") {
        desk.classList.add("eliminated-desk")
        const nameDiv = document.createElement("div")
        nameDiv.className = "student"
        nameDiv.innerText = seat.name
        desk.appendChild(nameDiv)
      }

      rowDiv.appendChild(desk)
      idx++
    }

    grid.appendChild(rowDiv)
  }
}

// ── Actions ─────────────────────────────────────────────────────────────────
function startGame() {
  socket.emit("startGame")
}

function sendMove() {
  const input = document.getElementById("moveInput").value.trim()
  const errEl = document.getElementById("moveError")
  errEl.style.display = "none"

  if (!input) {
    errEl.textContent = "Sayı girin."
    errEl.style.display = "block"
    return
  }

  const nums = input.split(",").map(n => parseInt(n.trim())).filter(n => !isNaN(n))

  if (nums.length === 0 || nums.length > 3) {
    errEl.textContent = "1 ile 3 arasında sayı girin."
    errEl.style.display = "block"
    return
  }

  socket.emit("move", nums)
  document.getElementById("moveInput").value = ""
}

document.getElementById("moveInput").addEventListener("keydown", e => {
  if (e.key === "Enter") sendMove()
})
</script>

</body>
</html>
