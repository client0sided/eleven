<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>eleven</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { font-family: 'Inter', sans-serif; }
  .desk { transition: all 0.15s ease; }
</style>
</head>
<body class="bg-neutral-950 text-neutral-100 min-h-screen p-4 pb-16">

  <!-- Overlay -->
  <div id="overlay" class="hidden fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4">
    <div id="overlayBox" class="bg-neutral-900 border border-neutral-800 rounded-2xl p-8 w-full max-w-sm text-center"></div>
  </div>

  <!-- Header -->
  <header class="flex justify-between items-center mb-6 max-w-5xl mx-auto">
    <span class="text-lg font-semibold text-white">eleven</span>
    <div class="flex items-center gap-5">
      <div id="gameStats" class="hidden flex items-center gap-5">
        <span class="text-neutral-500 text-sm">sayaç: <span id="numberDisplay" class="text-white font-medium">0</span></span>
        <span class="text-neutral-500 text-sm">kalan: <span id="aliveCount" class="text-white font-medium">—</span></span>
      </div>
      <span class="text-neutral-500 text-sm font-mono">kod: <span id="roomCode" class="text-neutral-300"></span></span>
    </div>
  </header>

  <div class="max-w-5xl mx-auto">

    <!-- Lobby -->
    <div id="lobby" class="hidden max-w-sm mx-auto">
      <div class="bg-neutral-900 border border-neutral-800 rounded-2xl p-6">
        <p class="text-xs text-neutral-500 uppercase tracking-widest mb-4">oyuncular</p>
        <ul id="playerList" class="mb-5 divide-y divide-neutral-800"></ul>
        <p id="waitMsg" class="hidden text-neutral-500 text-sm text-center mb-4">host oyunu başlatmasını bekliyor...</p>
        <button id="startBtn" class="hidden w-full bg-white text-neutral-950 font-medium text-sm rounded-xl py-2.5 hover:bg-neutral-200 transition-colors cursor-pointer" onclick="startGame()">
          oyunu başlat
        </button>
      </div>
    </div>

    <!-- Game -->
    <div id="game" class="hidden">

      <!-- Turn banner -->
      <div id="turnBanner" class="text-center py-3 px-4 rounded-xl border border-neutral-800 text-neutral-500 text-sm mb-3 transition-all"></div>

      <!-- Move input -->
      <div class="flex gap-2 mb-1">
        <input id="moveInput" type="text" placeholder="1  veya  1,2  veya  1,2,3" autocomplete="off"
          class="flex-1 bg-neutral-900 border border-neutral-700 rounded-xl px-4 py-2.5 text-sm text-white placeholder-neutral-600 outline-none focus:border-neutral-500 transition-colors">
        <button onclick="sendMove()"
          class="bg-neutral-800 border border-neutral-700 hover:bg-neutral-700 text-white font-medium text-sm rounded-xl px-5 py-2.5 transition-colors cursor-pointer">
          gönder
        </button>
      </div>
      <p id="moveError" class="text-red-400 text-xs min-h-4 mb-3 pl-1"></p>

      <!-- Feed -->
      <div id="feed" class="text-center mb-4 min-h-5 space-y-0.5"></div>

      <!-- Grid -->
      <div id="grid" class="flex flex-col gap-2 items-center"></div>

    </div>
  </div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io()
const params = new URLSearchParams(window.location.search)
const roomCode = params.get("room")
let playerName = params.get("name") || localStorage.getItem("playerName")

document.getElementById("roomCode").textContent = roomCode

function showOverlay(html) {
  document.getElementById("overlayBox").innerHTML = html
  document.getElementById("overlay").classList.remove("hidden")
}
function hideOverlay() {
  document.getElementById("overlay").classList.add("hidden")
}

if (!playerName) {
  showOverlay(`
    <p class="text-white font-medium mb-1">hoş geldin</p>
    <p class="text-neutral-400 text-sm mb-4">adınız ne?</p>
    <input id="nameInput" type="text" placeholder="isminiz" maxlength="20"
      class="w-full bg-neutral-800 border border-neutral-700 rounded-xl px-4 py-2.5 text-sm text-white placeholder-neutral-600 outline-none focus:border-neutral-500 mb-2">
    <p id="overlayErr" class="text-red-400 text-xs min-h-4 mb-3 text-left"></p>
    <button onclick="saveName()" class="w-full bg-white text-neutral-950 font-medium text-sm rounded-xl py-2.5 hover:bg-neutral-200 transition-colors cursor-pointer">devam</button>
  `)
} else {
  joinRoom()
}

function saveName() {
  const name = document.getElementById("nameInput").value.trim()
  if (!name) { document.getElementById("overlayErr").textContent = "isim boş olamaz"; return }
  localStorage.setItem("playerName", name)
  playerName = name
  hideOverlay()
  joinRoom()
}

function joinRoom() {
  socket.emit("joinRoom", { name: playerName, code: roomCode })
}

socket.on("errorMessage", msg => {
  showOverlay(`
    <p class="text-white font-medium mb-1">hata</p>
    <p class="text-neutral-400 text-sm mb-5">${msg}</p>
    <button onclick="window.location='/'" class="w-full bg-neutral-800 border border-neutral-700 hover:bg-neutral-700 text-white font-medium text-sm rounded-xl py-2.5 transition-colors cursor-pointer">geri dön</button>
  `)
})

socket.on("updateRoom", data => render(data))
socket.on("playerEliminated", ({ name }) => addFeed(`💀 ${name} elendi`))

socket.on("gameOver", ({ winner, reason }) => {
  const isMe = winner === playerName
  const emoji = isMe ? "🏆" : "👾"
  const title = isMe ? "kazandın!" : "oyun bitti"
  const sub = reason === "opponent_left"
    ? (isMe ? "rakip ayrıldı." : `rakip ayrıldı. kazanan: ${winner}`)
    : (isMe ? "tebrikler!" : `kazanan: ${winner}`)
  showOverlay(`
    <p class="text-4xl mb-3">${emoji}</p>
    <p class="text-white font-medium mb-1">${title}</p>
    <p class="text-neutral-400 text-sm mb-6">${sub}</p>
    <div class="flex gap-2">
      <button onclick="location.reload()" class="flex-1 bg-white text-neutral-950 font-medium text-sm rounded-xl py-2.5 hover:bg-neutral-200 transition-colors cursor-pointer">tekrar</button>
      <button onclick="window.location='/'" class="flex-1 bg-neutral-800 border border-neutral-700 hover:bg-neutral-700 text-white font-medium text-sm rounded-xl py-2.5 transition-colors cursor-pointer">çıkış</button>
    </div>
  `)
})

function render(data) {
  if (data.started) {
    document.getElementById("lobby").classList.add("hidden")
    document.getElementById("game").classList.remove("hidden")
    document.getElementById("gameStats").classList.remove("hidden")
  } else {
    document.getElementById("lobby").classList.remove("hidden")
    document.getElementById("game").classList.add("hidden")

    const list = document.getElementById("playerList")
    list.innerHTML = ""
    data.players.forEach(p => {
      const li = document.createElement("li")
      li.className = "flex justify-between items-center py-2.5 text-sm"
      li.innerHTML = `<span class="text-neutral-200">${p}</span>` +
        (p === data.host ? `<span class="text-xs text-neutral-500">host</span>` : "")
      list.appendChild(li)
    })

    if (playerName === data.host) {
      document.getElementById("startBtn").classList.remove("hidden")
      document.getElementById("waitMsg").classList.add("hidden")
    } else {
      document.getElementById("startBtn").classList.add("hidden")
      document.getElementById("waitMsg").classList.remove("hidden")
    }
    return
  }

  document.getElementById("numberDisplay").textContent = data.currentNumber
  document.getElementById("aliveCount").textContent = data.players.length

  const currentPlayer = data.players[data.currentPlayerIndex]
  const isMyTurn = currentPlayer === playerName
  const banner = document.getElementById("turnBanner")
  const input = document.getElementById("moveInput")

  if (isMyTurn) {
    banner.textContent = "sıra sende"
    banner.className = "text-center py-3 px-4 rounded-xl border border-white/20 bg-white/5 text-white text-sm mb-3 transition-all"
    input.disabled = false
    input.focus()
  } else {
    banner.textContent = `sıra: ${currentPlayer || ""}`
    banner.className = "text-center py-3 px-4 rounded-xl border border-neutral-800 text-neutral-500 text-sm mb-3 transition-all"
    input.disabled = true
  }

  const eliminated = data.eliminated || []
  const seats = []
  for (let i = 0; i < data.rows * data.cols; i++) {
    if (i < data.players.length) seats.push({ name: data.players[i], state: "active" })
    else if (i < data.players.length + eliminated.length) seats.push({ name: eliminated[i - data.players.length], state: "out" })
    else seats.push(null)
  }

  const grid = document.getElementById("grid")
  grid.innerHTML = ""
  let idx = 0
  for (let r = 0; r < data.rows; r++) {
    const row = document.createElement("div")
    row.className = "flex gap-2 flex-wrap justify-center"
    for (let c = 0; c < data.cols; c++) {
      const seat = seats[idx]
      const desk = document.createElement("div")
      desk.className = "desk w-24 h-16 bg-neutral-900 border border-neutral-800 rounded-xl flex items-center justify-center relative"

      const num = document.createElement("div")
      num.className = "absolute top-1 right-1.5 text-neutral-700 text-xs"
      num.textContent = idx + 1
      desk.appendChild(num)

      if (seat) {
        const nameEl = document.createElement("div")
        nameEl.className = "text-xs text-center px-1 break-all leading-tight"

        if (seat.state === "out") {
          desk.classList.add("opacity-20")
          nameEl.classList.add("line-through", "text-neutral-500")
          nameEl.textContent = seat.name
        } else {
          nameEl.classList.add("text-neutral-200")
          nameEl.textContent = seat.name

          if (idx === data.currentPlayerIndex) {
            desk.classList.remove("border-neutral-800")
            desk.classList.add("border-white/40", "bg-white/5")
          }
          if (seat.name === playerName) {
            desk.classList.remove("border-neutral-800")
            desk.classList.add("border-neutral-500")
          }
        }
        desk.appendChild(nameEl)
      }

      row.appendChild(desk)
      idx++
    }
    grid.appendChild(row)
  }
}

function addFeed(msg) {
  const feed = document.getElementById("feed")
  const p = document.createElement("p")
  p.className = "text-neutral-500 text-xs"
  p.textContent = msg
  feed.prepend(p)
  while (feed.children.length > 4) feed.removeChild(feed.lastChild)
}

function startGame() { socket.emit("startGame") }

function sendMove() {
  const input = document.getElementById("moveInput")
  const errEl = document.getElementById("moveError")
  const val = input.value.trim()
  errEl.textContent = ""
  if (!val) { errEl.textContent = "sayı girin"; return }
  const nums = val.split(",").map(n => parseInt(n.trim())).filter(n => !isNaN(n))
  if (nums.length === 0 || nums.length > 3) { errEl.textContent = "1 ile 3 arasında sayı girin"; return }
  socket.emit("move", nums)
  input.value = ""
}

document.addEventListener("keydown", e => { if (e.key === "Enter") sendMove() })
</script>
</body>
</html>
