<!DOCTYPE html>
<html lang="tr" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Eleven</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen px-4 py-6 pb-16">

  <!-- Overlay -->
  <div id="overlay" class="hidden fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4">
    <div id="overlayBox" class="bg-zinc-900 border border-zinc-800 rounded-xl p-8 w-full max-w-sm text-center"></div>
  </div>

  <!-- Header -->
  <header class="flex justify-between items-center mb-8 pb-4 border-b border-zinc-800 max-w-5xl mx-auto">
    <h1 class="text-xl font-black tracking-widest">ELEVEN</h1>
    <span class="text-zinc-500 text-sm">KOD: <span id="roomCode" class="text-zinc-200 font-mono font-bold"></span></span>
  </header>

  <div class="max-w-5xl mx-auto">

    <!-- LOBBY -->
    <div id="lobby" class="hidden max-w-sm mx-auto">
      <h2 class="text-xs uppercase tracking-widest text-zinc-500 mb-4 text-center">Oyuncular</h2>
      <ul id="playerList" class="mb-6 divide-y divide-zinc-800"></ul>
      <p id="waitMsg" class="hidden text-center text-zinc-500 text-sm mb-4">Host oyunu başlatmasını bekliyor...</p>
      <button id="startBtn" class="hidden w-full bg-white text-zinc-950 font-semibold text-sm rounded-lg py-2.5 hover:bg-zinc-200 transition-colors" onclick="startGame()">
        Oyunu Başlat
      </button>
    </div>

    <!-- GAME -->
    <div id="game" class="hidden">

      <div class="flex justify-center gap-16 bg-zinc-900 border border-zinc-800 rounded-xl p-6 mb-6">
        <div class="text-center">
          <span id="numberDisplay" class="block text-6xl font-black text-white leading-none">0</span>
          <span class="block text-xs uppercase tracking-widest text-zinc-500 mt-2">Sayaç</span>
        </div>
        <div class="text-center">
          <span id="aliveCount" class="block text-6xl font-black text-white leading-none">-</span>
          <span class="block text-xs uppercase tracking-widest text-zinc-500 mt-2">Kalan</span>
        </div>
      </div>

      <div id="turnBanner" class="text-center py-3 px-4 rounded-lg border border-zinc-800 text-zinc-500 text-sm mb-5"></div>

      <div class="flex justify-center gap-2 mb-1">
        <input id="moveInput" type="text" placeholder="1  veya  1,2  veya  1,2,3" autocomplete="off"
          class="bg-zinc-900 border border-zinc-700 rounded-lg px-4 py-2 text-sm text-zinc-100 placeholder-zinc-600 outline-none focus:border-zinc-500 w-56">
        <button onclick="sendMove()"
          class="bg-zinc-700 hover:bg-zinc-600 text-zinc-100 font-semibold text-sm rounded-lg px-5 py-2 transition-colors">
          Gönder
        </button>
      </div>
      <p id="moveError" class="text-center text-red-400 text-xs min-h-5 mb-5"></p>

      <div id="feed" class="text-center mb-4 min-h-6"></div>
      <div id="grid" class="flex flex-col gap-2 items-center mt-2"></div>

    </div>
  </div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io()
const params = new URLSearchParams(window.location.search)
const roomCode = params.get("room")
let playerName = params.get("name") || localStorage.getItem("playerName")

document.getElementById("roomCode").innerText = roomCode

function showOverlay(html) {
  document.getElementById("overlayBox").innerHTML = html
  document.getElementById("overlay").classList.remove("hidden")
}
function hideOverlay() {
  document.getElementById("overlay").classList.add("hidden")
}

if (!playerName) {
  showOverlay(`
    <h2 class="text-lg font-bold mb-2">Hoş Geldin</h2>
    <p class="text-zinc-400 text-sm mb-4">Adınız ne?</p>
    <input id="nameInput" type="text" placeholder="isminiz..." maxlength="20"
      class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-3 py-2 text-sm text-zinc-100 placeholder-zinc-600 outline-none focus:border-zinc-500 mb-2">
    <p id="overlayErr" class="text-red-400 text-xs min-h-4 mb-3"></p>
    <button onclick="saveName()" class="w-full bg-white text-zinc-950 font-semibold text-sm rounded-lg py-2.5 hover:bg-zinc-200 transition-colors">Devam</button>
  `)
} else {
  joinRoom()
}

function saveName() {
  const name = document.getElementById("nameInput").value.trim()
  if (!name) { document.getElementById("overlayErr").textContent = "İsim boş olamaz."; return }
  localStorage.setItem("playerName", name)
  playerName = name
  hideOverlay()
  joinRoom()
}

function joinRoom() {
  socket.emit("joinRoom", { name: playerName, code: roomCode })
}

socket.on("errorMessage", msg => {
  showOverlay(`
    <h2 class="text-lg font-bold mb-2">Hata</h2>
    <p class="text-zinc-400 text-sm mb-5">${msg}</p>
    <button onclick="window.location='/'" class="w-full bg-zinc-700 hover:bg-zinc-600 text-zinc-100 font-semibold text-sm rounded-lg py-2.5 transition-colors">Geri Dön</button>
  `)
})

socket.on("updateRoom", data => render(data))
socket.on("playerEliminated", ({ name }) => addFeed(`💀 ${name} elendi`))

socket.on("gameOver", ({ winner, reason }) => {
  const isMe = winner === playerName
  const title = isMe ? "🏆 Kazandın!" : "Oyun Bitti"
  const sub = reason === "opponent_left"
    ? (isMe ? "Rakip ayrıldı." : `Rakip ayrıldı. Kazanan: ${winner}`)
    : (isMe ? "Tebrikler!" : `Kazanan: ${winner}`)
  showOverlay(`
    <h2 class="text-lg font-bold mb-1">${title}</h2>
    <p class="text-zinc-400 text-sm mb-6">${sub}</p>
    <div class="flex gap-2">
      <button onclick="location.reload()" class="flex-1 bg-white text-zinc-950 font-semibold text-sm rounded-lg py-2.5 hover:bg-zinc-200 transition-colors">Tekrar</button>
      <button onclick="window.location='/'" class="flex-1 bg-zinc-700 hover:bg-zinc-600 text-zinc-100 font-semibold text-sm rounded-lg py-2.5 transition-colors">Ana Menü</button>
    </div>
  `)
})

function render(data) {
  if (data.started) {
    document.getElementById("lobby").classList.add("hidden")
    document.getElementById("game").classList.remove("hidden")
  } else {
    document.getElementById("lobby").classList.remove("hidden")
    document.getElementById("game").classList.add("hidden")

    const list = document.getElementById("playerList")
    list.innerHTML = ""
    data.players.forEach(p => {
      const li = document.createElement("li")
      li.className = "flex justify-between items-center py-2 text-sm"
      li.innerHTML = `<span>${p}</span>` + (p === data.host ? `<span class="text-xs text-zinc-500">HOST</span>` : "")
      list.appendChild(li)
    })

    if (playerName === data.host) {
      document.getElementById("startBtn").classList.remove("hidden")
      document.getElementById("waitMsg").classList.add("hidden")
    } else {
      document.getElementById("startBtn").classList.add("hidden")
      document.getElementById("waitMsg").classList.remove("hidden")
    }
    return
  }

  document.getElementById("numberDisplay").textContent = data.currentNumber
  document.getElementById("aliveCount").textContent = data.players.length

  const currentPlayer = data.players[data.currentPlayerIndex]
  const isMyTurn = currentPlayer === playerName
  const banner = document.getElementById("turnBanner")
  const input = document.getElementById("moveInput")

  if (isMyTurn) {
    banner.textContent = "⬇ Sıra sende!"
    banner.className = "text-center py-3 px-4 rounded-lg border border-white text-white bg-white/5 text-sm mb-5"
    input.disabled = false
    input.focus()
  } else {
    banner.textContent = `Sıra: ${currentPlayer || ""}`
    banner.className = "text-center py-3 px-4 rounded-lg border border-zinc-800 text-zinc-500 text-sm mb-5"
    input.disabled = true
  }

  const eliminated = data.eliminated || []
  const seats = []
  for (let i = 0; i < data.rows * data.cols; i++) {
    if (i < data.players.length) seats.push({ name: data.players[i], state: "active" })
    else if (i < data.players.length + eliminated.length) seats.push({ name: eliminated[i - data.players.length], state: "out" })
    else seats.push(null)
  }

  const grid = document.getElementById("grid")
  grid.innerHTML = ""
  let idx = 0
  for (let r = 0; r < data.rows; r++) {
    const row = document.createElement("div")
    row.className = "flex gap-2 flex-wrap justify-center"
    for (let c = 0; c < data.cols; c++) {
      const seat = seats[idx]
      const desk = document.createElement("div")
      desk.className = "w-28 h-20 bg-zinc-900 border border-zinc-800 rounded-lg flex items-center justify-center flex-col relative transition-all"

      const num = document.createElement("div")
      num.className = "absolute top-1 right-1.5 text-zinc-600 text-xs"
      num.textContent = idx + 1
      desk.appendChild(num)

      if (seat) {
        const nameEl = document.createElement("div")
        nameEl.className = "text-xs text-center px-1 break-all"
        nameEl.textContent = seat.name
        desk.appendChild(nameEl)

        if (seat.state === "out") {
          desk.classList.add("opacity-25")
          nameEl.classList.add("line-through", "text-zinc-500")
        } else {
          if (idx === data.currentPlayerIndex) {
            desk.classList.remove("border-zinc-800")
            desk.classList.add("border-white", "bg-white/5")
          }
          if (seat.name === playerName) {
            desk.classList.remove("border-zinc-800")
            desk.classList.add("border-zinc-400")
          }
        }
      }

      row.appendChild(desk)
      idx++
    }
    grid.appendChild(row)
  }
}

function addFeed(msg) {
  const feed = document.getElementById("feed")
  const p = document.createElement("p")
  p.className = "text-red-400 text-xs py-0.5"
  p.textContent = msg
  feed.prepend(p)
  while (feed.children.length > 4) feed.removeChild(feed.lastChild)
}

function startGame() { socket.emit("startGame") }

function sendMove() {
  const input = document.getElementById("moveInput")
  const errEl = document.getElementById("moveError")
  const val = input.value.trim()
  errEl.textContent = ""
  if (!val) { errEl.textContent = "Sayı girin."; return }
  const nums = val.split(",").map(n => parseInt(n.trim())).filter(n => !isNaN(n))
  if (nums.length === 0 || nums.length > 3) { errEl.textContent = "1 ile 3 arasında sayı girin."; return }
  socket.emit("move", nums)
  input.value = ""
}

document.addEventListener("keydown", e => { if (e.key === "Enter") sendMove() })
</script>
</body>
</html>
